apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 10.2.0
    helm:
      values: |
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: false
        redis-cluster:
          enabled: false

        gitea:
          config:
            APP_NAME: "Patel Homelab Git Core"
            RUN_MODE: prod
            database:
              DB_TYPE: postgres
              HOST: "gitea-postgres-service:5432"
              NAME: "gitea"
              USER: "gitea"
              PASSWD:
                valueFrom:
                  secretKeyRef:
                    name: gitea-db-secrets
                    key: db-password
          admin:
            existingSecret: gitea-db-secrets

        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 15Gi
          accessModes:
            - ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true