apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 10.2.0
    helm:
      values: |
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: false
        redis-cluster:
          enabled: false
        gitea:
          admin:
            existingSecret: gitea-admin-account-secrets
            usernameKey: username
            passwordKey: password
          config:
            APP_NAME: "Patel Homelab Git Core"
            RUN_MODE: prod
            database:
              DB_TYPE: postgres
              HOST: "gitea-postgres-new-rw.gitea.svc.cluster.local"
              PORT: 5432
              NAME: "gitea"
              USER: "gitea"
        extraVars:
          - name: GITEA__database__NAME
            value: "gitea"
          - name: GITEA__database__HOST
            value: "gitea-postgres-new-rw.gitea.svc.cluster.local"
          - name: GITEA__database__PORT
            value: "5432"
          - name: GITEA__database__USER
            valueFrom:
              secretKeyRef:
                name: gitea-db-secrets
                key: username
          - name: GITEA__server__ROOT_URL
            value: "https://gitea.taxayp.com/"
          - name: GITEA__database__PASSWD
            valueFrom:
              secretKeyRef:
                name: gitea-db-secrets
                key: password
        resources:
          requests:
            memory: 250Mi
            cpu: 200m
          limits:
            memory: 1Gi
            cpu: 1000m
        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 15Gi
          accessModes:
            - ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true