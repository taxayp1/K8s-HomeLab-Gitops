apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 10.2.0 
    helm:
      values: |
        gitea:
          config:
            APP_NAME: "Patel Homelab Git Core"
            RUN_MODE: prod
          admin:
            username: taxayp
            existingSecret: gitea-db-secrets
            passwordKey: admin-password
        
        postgresql-ha:
          enabled: false

        # Switch back to the Bitnami engine layout via a stable public mirror
        postgresql:
          enabled: true
          image:
            registry: gcr.io
            repository: bitnami-containers/postgresql
            tag: 16.3.0-debian-12-r10
          global:
            postgresql:
              auth:
                username: gitea
                database: gitea
                existingSecret: gitea-db-secrets
                secretKeys:
                  userPasswordKey: db-password
                  adminPasswordKey: db-password
          primary:
            persistence:
              enabled: true
              storageClass: "longhorn"
              size: 5Gi

        redis-cluster:
          enabled: false
            
        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 15Gi
          accessModes:
            - ReadWriteOnce