apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 10.2.0
    helm:
      values: |
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: false
        redis-cluster:
          enabled: false

        gitea:
          admin:
            existingSecret: gitea-db-secrets
            usernameKey: username
            passwordKey: password
          config:
            APP_NAME: "Patel Homelab Git Core"
            RUN_MODE: prod
            database:
              DB_TYPE: postgres
              HOST: "gitea-postgres-service:5432"
              NAME: "gitea"
              USER: "gitea"

        # THE TRUE FIX: The official chart requires env vars to be 
        # injected at the root level under 'deployment', NOT inside 'gitea'.
        deployment:
          env:
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: gitea-db-secrets
                  key: db-password

        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 15Gi
          accessModes:
            - ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true