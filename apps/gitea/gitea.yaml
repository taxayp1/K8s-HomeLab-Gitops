apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 10.2.0 
    helm:
      values: |
        gitea:
          config:
            APP_NAME: "Taxay's Homelab Git Core"
            RUN_MODE: prod
          admin:
            username: taxayp
            existingSecret: gitea-db-secrets
            passwordKey: admin-password
        
        # Database Configuration (PostgreSQL StatefulSet)
        postgresql-ha:
          enabled: false

        postgresql:
          enabled: true
          image:
            registry: docker.io
            repository: library/postgres
            tag: "16.3"
          primary:
            extraEnvVars:
              - name: POSTGRES_USER
                value: "gitea"
              - name: POSTGRES_DB
                value: "gitea"
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: gitea-db-secrets
                    key: db-password
            persistence:
              enabled: true
              storageClass: "longhorn"
              size: 5Gi

        redis-cluster:
          enabled: false       

        # Raw Git Repository Storage
        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 15Gi
          accessModes:
            - ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true