apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: 10.2.0
    helm:
      values: |
        postgresql-ha:
          enabled: false
        postgresql:
          enabled: false
        redis-cluster:
          enabled: false

        gitea:
          admin:
            existingSecret: gitea-db-secrets
            usernameKey: username
            passwordKey: password

        # YOUR FIX: Native Gitea Environment Variables mapping
        env:
          - name: GITEA__database__DB_TYPE
            value: "postgres"
          - name: GITEA__database__HOST
            value: "gitea-postgres-service:5432"
          - name: GITEA__database__NAME
            value: "gitea"
          - name: GITEA__database__USER
            value: "gitea"
          - name: GITEA__database__PASSWD
            valueFrom:
              secretKeyRef:
                name: gitea-db-secrets
                key: db-password

        persistence:
          enabled: true
          storageClass: "longhorn"
          size: 15Gi
          accessModes:
            - ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true