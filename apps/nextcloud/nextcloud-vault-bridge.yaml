
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: nextcloud
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "argocd-role"

---

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud-secrets
  namespace: nextcloud
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: nextcloud-app-secrets
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef: { key: nextcloud, property: db-password }
    - secretKey: db-password
      remoteRef: { key: nextcloud, property: db-password }  
    - secretKey: admin-password
      remoteRef:
        key: nextcloud
        property: admin-password
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: longhorn-aws
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: longhorn-aws
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: username
      remoteRef:
        key: nextcloud
        property: username