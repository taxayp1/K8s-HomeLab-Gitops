apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nextcloud-postgres
  namespace: nextcloud
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16.3

  storage:
    size: 10Gi
    storageClass: longhorn

  bootstrap:
    initdb:
      database: nextcloud
      owner: nextcloud
      secret:
        name: nextcloud-app-secrets
  backup:
    barmanObjectStore:
      destinationPath: "s3://my-longhorn-backups-syd/backups/nextcloud/"
      s3Credentials:
        accessKeyId:
          key: AWS_ACCESS_KEY_ID
          name: nextcloud-app-secrets
        secretAccessKey:
          key: AWS_SECRET_ACCESS_KEY
          name: nextcloud-app-secrets
      wal:
        compression: gzip



