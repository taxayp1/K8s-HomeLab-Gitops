apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: gitlab
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "argocd-role"

---

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-db-vault-secrets
  namespace: gitlab
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: gitlab
        property: db-password    
    - secretKey: username
      remoteRef:
        key: gitlab
        property: db-username 

    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: longhorn-aws
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: longhorn-aws
        property: AWS_SECRET_ACCESS_KEY

---

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-admin-vault-secrets
  namespace: gitlab
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-admin-account-secrets
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: gitlab
        property: admin-username        
    - secretKey: password
      remoteRef:
        key: gitlab
        property: admin-password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-redis-vault-secret
  namespace: gitlab
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: gitlab
        property: redis-password