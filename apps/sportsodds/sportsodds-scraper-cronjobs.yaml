apiVersion: batch/v1
kind: CronJob
metadata:
  name: sportsodds-scraper
  namespace: sportsodds
spec:
  suspend: true
  schedule: "0 */2 * * *"        
  concurrencyPolicy: Forbid          
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1200   
      backoffLimit: 0              
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: gitlab-registry-credentials
          containers:
            - name: scraper
              image: registry.taxayp.com/taxayp/sportsodds-scraper:latest
              env:
                - name: SPORTS
                  value: "afl nrl cricket ufc"   
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: sportsodds-pg-app
                      key: uri
                - name: BETFAIR_APP_KEY
                  valueFrom:
                    secretKeyRef:
                      name: sportsodds-secrets
                      key: BETFAIR_APP_KEY
                - name: BETFAIR_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: sportsodds-secrets
                      key: BETFAIR_USERNAME
                - name: BETFAIR_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: sportsodds-secrets
                      key: BETFAIR_PASSWORD
              resources:
                requests: { cpu: "500m", memory: "1Gi" }
                limits:   { cpu: "2",    memory: "3Gi" }   
