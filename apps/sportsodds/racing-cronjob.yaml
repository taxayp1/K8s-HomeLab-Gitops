apiVersion: batch/v1
kind: CronJob
metadata:
  name: sportsodds-racing
  namespace: sportsodds
spec:
  # oddspro refreshes via BetWatch every 5 min - polling faster is wasted calls.
  schedule: "*/5 * * * *"
  startingDeadlineSeconds: 120
  # Forbid: a slow run must not overlap the next 5-min tick.
  concurrencyPolicy: Forbid
  # 288 runs/day - keep history small so completed pods don't pile up.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      # One /api/meetings pull is quick; cap the run so a hung fetch can't
      # block the next tick under Forbid. 30s timeout in code + margin.
      activeDeadlineSeconds: 120
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: gitlab-registry-credentials
          containers:
            - name: sportsodds-racing
              # IMPORTANT: keep this image tag in sync with the web Deployment.
              # Same image serves web + all cron jobs; it must contain
              # racingFetch.js / db-racing.js / racingBookies.js.
              image: registry.taxayp.com/taxayp/sportsodds:7dbb623b
              command: ["node", "racingFetch.js"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: sportsodds-pg-app
                      key: uri
              envFrom:
                - secretRef:
                    name: sportsodds-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi