apiVersion: batch/v1
kind: CronJob
metadata:
  name: sportsodds-fetch
  namespace: sportsodds
spec:
  schedule: "0 */12 * * *"
  startingDeadlineSeconds: 600
  concurrencyPolicy: Forbid 
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 300  
      template:
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: gitlab-registry-credentials
          containers:
            - name: sportsodds-fetch
              image: registry.taxayp.com/taxayp/sportsodds:c9781040
              command: ["node", "cronFetch.js"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: sportsodds-pg-app
                      key: uri
              envFrom:
                - secretRef:
                    name: sportsodds-secrets
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
