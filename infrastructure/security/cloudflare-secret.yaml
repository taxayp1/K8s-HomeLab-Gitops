apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token-secret 
  namespace: cert-manager          
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend             
    kind: SecretStore         
  target:
    name: cloudflare-api-token-secret
    creationPolicy: Owner           
  data:
  - secretKey: api-token             
    remoteRef:
      key: secret/kv/infrastructure/security/cloudflare
      property: api-token                     
