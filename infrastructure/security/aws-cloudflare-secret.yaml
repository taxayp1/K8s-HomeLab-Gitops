apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: cert-manager  
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "argocd-role"  


---

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token-secret 
  namespace: cert-manager          
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend             
    kind: SecretStore         
  target:
    name: cloudflare-api-token-secret
    creationPolicy: Owner           
  data:
  - secretKey: api-token             
    remoteRef:
      key: infrastructure/security/cloudflare
      property: api-token                     

