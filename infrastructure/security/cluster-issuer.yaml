apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    # Use the staging URL first so you don't get banned while testing!
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: taxayp@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx
