apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki-stack
    targetRevision: 2.10.2  # Standard stable target version for the combined stack
    helm:
      values: |
        loki:
          enabled: true
          fullnameOverride: "loki"
          # Memory limits to save your SFF node RAM pools
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          chunksCache:
            resources:
              requests:
                memory: 128Mi
              limits:
                memory: 256Mi
          resultsCache:
            resources:
              requests:
                memory: 128Mi
              limits:
                memory: 256Mi

        promtail:
          enabled: true
          fullnameOverride: "promtail"
          # Tiny limits because promtail just streams text logs to loki
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: false      # KEEP FALSE FOR THE FIRST SYNC
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
