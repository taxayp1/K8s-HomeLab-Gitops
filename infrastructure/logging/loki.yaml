apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0
    helm:
      values: |
        fullnameOverride: "loki"
        deploymentMode: SingleBinary
        
        # --- 1. RUNNING THE POD & SETTING RAM LIMITS ---
        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          # --- 2. CONNECTING TO YOUR LONGHORN STORAGE ---
          persistence:
            enabled: true
            size: 10Gi
            storageClass: longhorn
            volumeClaimsTemplates:
              - metadata:
                  name: storage
                spec:
                  accessModes:
                    - RWO
                  resources:
                    requests:
                      storage: 10Gi
                  storageClassName: longhorn

        # Disable distributed scaling pods we don't need
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        
        # --- 3. LOG STORAGE MANAGEMENT & 2-DAY RETENTION ---
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            local:
              directory: /var/loki/chunks
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            retention_period: 48h
          compactor:
            working_directory: /var/loki/retention
            retention_enabled: true
            retention_delete_delay: 2h
            retention_delete_worker_count: 150
            delete_request_store: filesystem
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
