apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0  # Matches your exact running chart version
    helm:
      values: |
        fullnameOverride: "loki"
        
        # 1. Force the exact Single Binary mode matching your running pod layout
        deploymentMode: SingleBinary
        
        singleBinary:
          replicas: 1
          # Mounts your EXACT existing 10Gi Longhorn PVC storage volume configuration
          persistence:
            enabled: true
            size: 10Gi
            storageClass: longhorn
            # Matching the volume name prefix patterns for loki statefulsets
            volumeClaimsTemplates:
              - metadata:
                  name: storage
                spec:
                  accessModes:
                    - RWO
                  resources:
                    requests:
                      storage: 10Gi
                  storageClassName: longhorn
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # 2. CRITICAL: Completely disable distributed targets to pass the v7 validation error
        backend:
          replicas: 0
        read:
          replicas: 0
        write:
          replicas: 0
        
        # 3. Explicitly declare simple filesystem storage rules over your mounted volume
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            local:
              directory: /var/loki/chunks
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin

        # Turn off the multi-pod microservice cache layers
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
