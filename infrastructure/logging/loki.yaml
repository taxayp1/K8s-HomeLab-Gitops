apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0
    helm:
      values: |
        fullnameOverride: "loki"
        deploymentMode: SingleBinary

        # --- 1. RUNNING THE SINGLE BINARY POD & MEMORY SETTINGS ---
        singleBinary:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          persistence:
            enabled: true
            size: 10Gi
            storageClass: longhorn

        # --- 2. COMPLETELY STRIP EXTENDED ENTERPRISE CACHES ---
        memcached:
          chunks:
            enabled: false
          results:
            enabled: false
        
        gateway:
          enabled: false

        resultsCache:
          enabled: false

        chunksCache:
          enabled: false

        # --- 3. STORAGE & RETENTION CORE ENGINE CONFIG ---
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            local:
              directory: /var/loki/chunks
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          limits_config:
            retention_period: 48h
            max_cache_freshness_per_query: 0s
          compactor:
            working_directory: /var/loki/retention
            retention_enabled: true
            retention_delete_delay: 2h
            retention_delete_worker_count: 50
            delete_request_store: filesystem
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
