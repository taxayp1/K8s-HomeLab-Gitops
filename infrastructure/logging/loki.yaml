apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 7.0.0  # Matches your exact manual deployment chart version
    helm:
      values: |
        fullnameOverride: "loki"
        
        # This matches your app.kubernetes.io/component=single-binary deployment layout
        deploymentMode: SingleBinary
        
        singleBinary:
          replicas: 1
          # Enforce memory limits on your main engine container to save your node RAM pools
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # Explicitly configure the storage type to filesystem so the 7.0.0 templates compile
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            local:
              directory: /var/loki/chunks
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin

        # Disable caching deployments if you aren't using external memcached pools
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
