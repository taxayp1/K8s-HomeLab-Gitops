apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: argocd-bcrypt-generator
  namespace: argocd
spec:
  # This tells the operator to convert your plain text into a secure bcrypt string
  length: 24

---

apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: argocd
spec:
  provider:
    vault:
      # This points to the standalone Vault service running in your cluster
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "argocd-role"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-secret-sync
  namespace: argocd
spec:
  refreshInterval: "1m" # Checks Vault every minute for changes
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: argocd-secret # Directly targets the core Argo CD secret
    creationPolicy: "Merge" # Merges values so it doesn't drop server.secretkey
  data:
    - secretKey: "admin.password"
      remoteRef:
        key: "argocd"                # The secret path name you made in the Vault UI
        property: "admin.password"   # The Key name you added inside that secret path
