apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-storage
  namespace: argocd
spec:
  project: default
  source:
    # Use the official Helm repository instead of GitHub
    repoURL: https://rancher.github.io/local-path-provisioner/
    chart: local-path-provisioner
    targetRevision: 0.0.30 # Use a stable version
    helm:
      values: |
        storageClass:
          name: local-path
          defaultClass: false
        nodePathMap:
          - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
            paths:
              - /opt/local-path-provisioner
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Tells Argo to create the namespace if it's missing
