apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: monitoring # Deployed directly into the monitoring namespace
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "argocd-role"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials-sync
  namespace: monitoring
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: grafana-admin-credentials # This matches your helm existingSecret definition!
    creationPolicy: "Owner"       # Creates the secret cleanly from scratch
  data:
    - secretKey: "admin-user"
      remoteRef:
        key: "grafana"
        property: "admin-user"
    - secretKey: "admin-password"
      remoteRef:
        key: "grafana"
        property: "admin-password"
