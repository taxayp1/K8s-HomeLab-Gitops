apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true 
      - CreateNamespace=true
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 85.1.1
    helm:
      values: |
        grafana:
          resources:
            requests:
              memory: 150Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          persistence:
            enabled: true
            storageClassName: "longhorn"
            size: 2Gi
            accessModes:
              - ReadWriteOnce
          admin:
            existingSecret: grafana-admin-credentials
            userKey: admin-user
            passwordKey: admin-password
          additionalDataSources:
          - access: proxy
            jsonData:
              maxLines: 1000
            name: Loki
            type: loki
            url: http://loki.logging.svc.cluster.local:3100
        
        kubeControllerManager:
          enabled: true
        kubeScheduler:
          enabled: true
        kubeEtcd:
          enabled: true
        kubeProxy:
          enabled: false
          
        prometheus:
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            scrapeInterval: 60s
            evaluationInterval: 60s
            resources:
              limits:
                memory: 800Mi
                cpu: 500m
              requests:
                memory: 400Mi
                cpu: 200m
            retention: 2d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 10Gi
                  storageClassName: longhorn

        alertmanager:
          config:
            global:
              resolve_timeout: 5m
              smtp_smarthost: 'smtp.gmail.com:587'
              smtp_from: 'taxayp1@gmail.com'
              smtp_auth_username: 'taxayp1@gmail.com'
              smtp_auth_password_file: '/etc/alertmanager/secrets/alertmanager-smtp-credentials/smtp-password'
              smtp_require_tls: true
            route:
              group_by: ['alertname', 'namespace']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              receiver: 'null'
              routes:
                - receiver: 'email-critical'
                  matchers:
                    - severity =~ "critical|warning"
                  continue: false
            receivers:
              - name: 'null'
              - name: 'email-critical'
                email_configs:
                  - to: 'taxayp1@gmail.com'
                    send_resolved: true
          alertmanagerSpec:
            secrets:
              - alertmanager-smtp-credentials
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring